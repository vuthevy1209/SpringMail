server:
  servlet:
    context-path: /api

spring:
  application:
    name: SpringMail
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/gmail.modify
  data:
    redis:
      host: localhost
      port: 6379
  mongodb:
    uri: mongodb://root:123456@localhost:27017/SpringMail?authSource=admin&authMechanism=SCRAM-SHA-256
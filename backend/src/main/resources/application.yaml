server:
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 2048
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 35MB
  application:
    name: SpringMail
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
              - https://www.googleapis.com/auth/gmail.readonly
              - https://www.googleapis.com/auth/gmail.modify
  data:
    redis:
      host: localhost
      port: 6379
  mongodb:
    uri: mongodb://root:123456@localhost:27017/SpringMail?authSource=admin&authMechanism=SCRAM-SHA-256
  elasticsearch:
    uris: http://localhost:9200
    username:
    password:

management:
  health:
    elasticsearch:
      enabled: false